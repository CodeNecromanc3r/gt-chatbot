databases:
  - name: chickfila-chatbot-db
    plan: free
    databaseName: chickfila_chatbot
    user: chickfila

services:
  - type: web
    name: chickfila-chatbot
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn gtchatbot.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chickfila-chatbot-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: OPENAI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.11"
